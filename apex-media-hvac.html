<script>
function toggleSeason(season){const winterBtn=document.querySelector('.season-btn.winter');const summerBtn=document.querySelector('.season-btn.summer');const h1=document.querySelector('.hero h1');if(season==='winter'){winterBtn.className='season-btn winter active-winter';summerBtn.className='season-btn summer';h1.innerHTML='FULL CALENDAR.<br><span class="cyan">ALL YEAR.</span><br><span class="outline">YOUR HVAC.</span>';}else{summerBtn.className='season-btn summer active-summer';winterBtn.className='season-btn winter';h1.innerHTML='COOL SUMMER.<br><span class="fire">HOT REVENUE.</span><br><span class="outline">YOUR HVAC.</span>';}}
const reveals=document.querySelectorAll('.reveal,.reveal-left,.reveal-right');
const observer=new IntersectionObserver((entries)=>{entries.forEach((entry,i)=>{if(entry.isIntersecting)setTimeout(()=>entry.target.classList.add('visible'),i*80);});},{threshold:0.1});
reveals.forEach(el=>observer.observe(el));
window.addEventListener('scroll',()=>{const nav=document.querySelector('nav');nav.style.padding=window.scrollY>50?'12px 60px':'18px 60px';});
</script>
