<style>
  :root {
    --black: #080808;
    --white: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gray: #1a1a1a;
    --gray2: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 24px 60px; background: rgba(8,8,8,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,0.15); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); }
  .logo span { color: var(--white); }
  nav a { color: var(--white); text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: 1px; opacity: 0.7; transition: opacity 0.2s; }
  nav a:hover { opacity: 1; }
  .nav-cta { background: var(--gold); color: var(--black) !important; opacity: 1 !important; padding: 10px 24px; font-weight: 600 !important; }
  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 140px 60px 80px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -200px; right: -200px; width: 700px; height: 700px; background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%); pointer-events: none; }
  .hero::after { content: 'APEX'; position: absolute; right: -20px; bottom: -80px; font-family: 'Bebas Neue', sans-serif; font-size: 320px; color: rgba(201,168,76,0.04); pointer-events: none; line-height: 1; }
  .hero-tag { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 32px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
  .hero-tag::before { content: ''; width: 32px; height: 1px; background: var(--gold); }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 10vw, 130px); line-height: 0.92; letter-spacing: 2px; max-width: 900px; opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards; }
  h1 em { font-style: normal; color: var(--gold); }
  .hero-sub { font-size: 18px; font-weight: 300; line-height: 1.7; max-width: 540px; margin-top: 32px; opacity: 0; color: rgba(245,240,232,0.65); animation: fadeUp 0.8s ease 0.6s forwards; }
  .hero-actions { display: flex; align-items: center; gap: 32px; margin-top: 48px; opacity: 0; animation: fadeUp 0.8s ease 0.8s forwards; }
  .btn-primary { background: var(--gold); color: var(--black); padding: 16px 40px; font-size: 15px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; display: inline-block; transition: all 0.3s; }
  .btn-ghost { color: var(--white); text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; opacity: 0.6; transition: opacity 0.2s; }
  .btn-ghost:hover { opacity: 1; }
  .btn-ghost::after { content: '→'; }
  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid rgba(201,168,76,0.2); border-bottom: 1px solid rgba(201,168,76,0.2); margin: 0 60px; }
  .stat { padding: 40px; border-right: 1px solid rgba(201,168,76,0.2); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 13px; color: rgba(245,240,232,0.5); letter-spacing: 1px; margin-top: 6px; }
  .section { padding: 120px 60px; }
  .section-tag { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .section-tag::before { content: ''; width: 24px; height: 1px; background: var(--gold); }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 6vw, 80px); line-height: 0.95; max-width: 700px; margin-bottom: 80px; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .service-card { background: var(--gray); padding: 48px 40px; position: relative; overflow: hidden; transition: background 0.3s; }
  .service-card:hover { background: var(--gray2); }
  .service-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon { font-size: 36px; margin-bottom: 24px; }
  .service-card h3 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
  .service-card p { font-size: 14px; line-height: 1.8; color: rgba(245,240,232,0.55); }
  .service-tag { display: inline-block; margin-top: 20px; padding: 4px 12px; background: rgba(201,168,76,0.15); color: var(--gold); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .packages { padding: 120px 60px; background: var(--gray); }
  .packages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .package { background: var(--black); padding: 48px 40px; position: relative; transition: transform 0.3s; }
  .package:hover { transform: translateY(-4px); }
  .package.featured { background: var(--gray2); border: 1px solid var(--gold); }
  .package-badge { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--black); padding: 4px 20px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
  .package-name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; }
  .package-price { font-family: 'Bebas Neue', sans-serif; font-size: 64px; line-height: 1; margin-bottom: 4px; }
  .package-price span { font-size: 24px; vertical-align: top; margin-top: 12px; display: inline-block; }
  .package-period { font-size: 13px; color: rgba(245,240,232,0.4); margin-bottom: 32px; }
  .package-divider { height: 1px; background: rgba(201,168,76,0.2); margin-bottom: 32px; }
  .package-feature { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
  .package-feature .check { color: var(--gold); font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .package-feature p { font-size: 14px; color: rgba(245,240,232,0.7); line-height: 1.5; }
